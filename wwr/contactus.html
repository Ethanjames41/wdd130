<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Dry Oar | Contact Us</title>
</head>
<body class="contact-body">
    <div id="content">
        <header>
            <a href="index.html" id="logo_link">
                <img class="logo" src="images/logo1.svg" alt="site logo" width="90">
            </a>

            <nav>
                <a href="index.html">Home</a>
                <a href="trips.html">Trips</a>
                <a href="site-plan-rafting.html">Site Plan</a>
                <a class="active" href="contactus.html" aria-current="page">Contact Us</a>
            </nav>
        </header>

        <section class="subpage-hero">
            <img src="images/mountains.jpg" alt="Rafting canyon with mountain views">
            <div class="hero-copy">
                <p class="eyebrow">Contact</p>
                <h1>Send Us a Message</h1>
                <p>Use this Week 10 practice form to reach the Dry Oar guide team.</p>
            </div>
        </section>

        <main class="contact-page">
            <section class="contact-form-section form-wrapper">
                <h2>Contact Us</h2>
                <p>Fill out the form below and a guide will follow up with you.</p>

                <div id="feedback" aria-live="polite"></div>

                <form action="#" method="post" class="contact-form-tutorial">
                    <ul>
                        <li>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="user_name" required>
                        </li>
                        <li>
                            <label for="mail">Email:</label>
                            <input type="email" id="mail" name="user_email" required>
                        </li>
                        <li>
                            <label for="msg">Message:</label>
                            <textarea id="msg" name="user_message" required></textarea>
                        </li>
                        <li class="button">
                            <button class="book" type="submit">Send your message</button>
                        </li>
                    </ul>
                </form>
            </section>
        </main>

        <footer>
            <p>Dry Oar &copy; 2026 - Ethan James Walker</p>
            <p><a href="site-plan-rafting.html">Site Plan</a></p>
            <p><a href="contactus.html">Contact Us</a></p>
            <div class="social">
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/facebook.png" alt="fb icon">
                </a>
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/twitter.png" alt="twitter icon">
                </a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/instagram.png" alt="instagram icon">
                </a>
            </div>
        </footer>
    </div>

    <script>
        // Get the feedback div element so we can do something with it.
        const feedbackElement = document.getElementById('feedback');
        // Get the form so we can read what was entered in it.
        const formElement = document.forms[0];
        // Add a listener to wait for a submission of our form.
        formElement.addEventListener('submit', function (e) {
            // Stop the form from doing the default action.
            e.preventDefault();
            // Personalize the success message with the submitted name.
            feedbackElement.innerHTML = 'Hello ' + formElement.user_name.value + '! Thank you for your message. We will get back with you as soon as possible!';
            // Make the feedback element visible.
            feedbackElement.style.display = 'block';
            // Move the page down so the message does not cover the content.
            document.body.classList.add('moveDown');
        });
    </script>
</body>
</html>
